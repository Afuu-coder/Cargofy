version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: cargofy_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cargofy
      POSTGRES_PASSWORD: cargofy_dev_password
      POSTGRES_DB: cargofy_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cargofy -d cargofy_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: pgAdmin for DB management UI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cargofy_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cargofy.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    profiles:
      - tools

volumes:
  postgres_data:
    name: cargofy_postgres_data
