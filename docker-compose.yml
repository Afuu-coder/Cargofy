version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: axon_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: axon
      POSTGRES_PASSWORD: axon_dev_password
      POSTGRES_DB: axon_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axon -d axon_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: pgAdmin for DB management UI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: axon_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@axon.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    profiles:
      - tools

volumes:
  postgres_data:
    name: axon_postgres_data
